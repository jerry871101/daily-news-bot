name: Daily News Bot

on:
  schedule:
    # 這是世界協調時間 (UTC)，22:00 等於台灣時間 (UTC+8) 的早上 06:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 加上這個設定，讓我們等一下可以按按鈕手動測試！

jobs:
  run-bot:
    runs-on: ubuntu-latest # 開啟一台最新的 Linux 雲端虛擬機

    steps:
    # 步驟 1：把您的程式碼抓到虛擬機裡
    - name: 取得程式碼
      uses: actions/checkout@v3

    # 步驟 2：安裝 Python 環境
    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # 使用穩定的 Python 版本

    # 步驟 3：安裝我們寫在 requirements.txt 裡的套件
    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 步驟 4：執行程式，並把保險箱的密碼拿出來餵給程式
    - name: 執行每日新聞抓取與寄送
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        python news_bot.py
