name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest 

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4  # 👈 升級為 v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5 # 👈 升級為 v5
      with:
        python-version: '3.11' 

    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行每日新聞抓取與寄送
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        python news_bot.py
